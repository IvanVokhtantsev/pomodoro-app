<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Pomogochi icon</title>
  <desc id="desc">A red Pomogochi sphere with soft highlights, tiny eyes, and a calm smile.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="82" x2="894" y2="944" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dbeafe" />
      <stop offset="0.5" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>
    <radialGradient id="body" cx="42%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="55%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#c81e1e" />
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7fb" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#ffe4ec" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="132" y="136" width="780" height="776" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="34" flood-color="#0f172a" flood-opacity="0.22" stdDeviation="28" />
    </filter>
    <filter id="glow" x="178" y="184" width="688" height="680" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="22" />
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)" />
  <circle cx="210" cy="202" r="148" fill="#ffffff" opacity="0.28" />
  <circle cx="816" cy="240" r="184" fill="#ffffff" opacity="0.28" />
  <circle cx="766" cy="800" r="238" fill="#ffffff" opacity="0.22" />

  <g opacity="0.42" filter="url(#glow)">
    <circle cx="522" cy="528" r="242" fill="#ef4444" />
  </g>

  <g filter="url(#shadow)">
    <circle cx="522" cy="528" r="228" fill="url(#body)" />
    <ellipse cx="454" cy="394" rx="70" ry="100" transform="rotate(-34 454 394)" fill="#ffffff" opacity="0.24" />
    <ellipse cx="688" cy="394" rx="58" ry="88" transform="rotate(26 688 394)" fill="#ffffff" opacity="0.22" />
    <ellipse cx="570" cy="500" rx="72" ry="64" fill="url(#centerGlow)" />

    <ellipse
      cx="520"
      cy="520"
      rx="268"
      ry="168"
      transform="rotate(26 520 520)"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.14"
      stroke-width="4"
    />
    <ellipse
      cx="520"
      cy="520"
      rx="202"
      ry="124"
      transform="rotate(26 520 520)"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.11"
      stroke-width="3"
    />

    <circle cx="500" cy="534" r="18" fill="#374151" />
    <circle cx="500" cy="534" r="7" fill="#111827" />
    <circle cx="620" cy="534" r="18" fill="#374151" />
    <circle cx="620" cy="534" r="7" fill="#111827" />

    <path
      d="M534 620c14 10 38 10 52 0"
      fill="none"
      stroke="#3f1820"
      stroke-linecap="round"
      stroke-width="10"
    />
    <path
      d="M528 614h64"
      fill="none"
      stroke="#3f1820"
      stroke-linecap="round"
      stroke-width="8"
      opacity="0.92"
    />
  </g>
</svg>
